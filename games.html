<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thursday Games Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0b0b0b;
    --card-bg: #161616;
    --accent-red: #ff0000;
    --text-white: #ffffff;
    --text-grey: #959595;
    --border-color: #2a2a2a;
    
    --heading-font: 'Oswald', sans-serif;
    --body-font: 'Source Sans 3', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--bg-dark);
    color: var(--text-white);
    font-family: var(--body-font);
    padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Header Design */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    border-bottom: 2px solid var(--border-color);
    padding-bottom: 20px;
  }

  header h1 {
    font-family: var(--heading-font);
    font-size: 2.5rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  header h1 span { color: var(--accent-red); }

  /* 1st Image: Featured Games Grid Slider Layout */
  .section-title {
    font-family: var(--heading-font);
    font-size: 1.8rem;
    text-transform: uppercase;
    margin-bottom: 24px;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 60px;
  }

  .game-card {
    background-color: var(--card-bg);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--border-color);
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  .game-card:hover {
    transform: translateY(-5px);
    border-color: var(--accent-red);
  }

  .poster-wrapper {
    position: relative;
    aspect-ratio: 3/4;
    width: 100%;
  }

  .poster-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* 2nd Image: Expanded Dedicated Console Display Engine */
  .expanded-view-container {
    display: none; /* Controlled by Engine JS state router */
    background: linear-gradient(180deg, #111111 0%, #050505 100%);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 40px;
    margin-top: 20px;
    position: relative;
    box-shadow: 0 20px 40px rgba(0,0,0,0.8);
  }

  .expanded-view-container.active {
    display: block;
    animation: fadeIn 0.4s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .expanded-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
  }

  .expanded-poster {
    width: 260px;
    aspect-ratio: 1/1;
    border: 4px solid var(--border-color);
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  }

  .expanded-poster img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .game-title {
    font-family: var(--heading-font);
    font-size: 3.2rem;
    text-transform: uppercase;
    line-height: 1.1;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }

  .game-tagline {
    font-size: 1.1rem;
    color: var(--text-grey);
    font-weight: 600;
    margin-bottom: 16px;
  }

  .platform-badge {
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: #222;
    padding: 4px 12px;
    border-radius: 4px;
    margin-bottom: 30px;
    border: 1px solid #333;
    display: inline-block;
  }

  /* Custom Select Action Terminal Button */
  .download-btn {
    width: 100%;
    max-width: 450px;
    background: transparent;
    border: 2px solid var(--text-white);
    color: var(--text-white);
    font-family: var(--heading-font);
    font-size: 1.3rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 16px 32px;
    letter-spacing: 2px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background-color 0.2s, border-color 0.2s, color 0.2s;
  }

  .download-btn:hover {
    background-color: var(--text-white);
    color: var(--bg-dark);
  }

  .close-btn {
    position: absolute;
    top: 20px;
    right: 25px;
    background: none;
    border: none;
    color: var(--text-grey);
    font-size: 2rem;
    cursor: pointer;
  }
  .close-btn:hover { color: var(--text-white); }
</style>
</head>
<body>

<div class="container">
  
  <header>
    <h1>Thursday <span>Games</span></h1>
  </header>

  <section>
    <div class="section-title">Featured Games</div>
    <div class="games-grid" id="featured-grid">
      </div>
  </section>

  <div class="expanded-view-container" id="expanded-view-window">
    <button class="close-btn" onclick="closeEngineView()">&times;</button>
    <div class="expanded-content" id="expanded-view-content">
      </div>
  </div>

</div>

<script>
  // ==========================================
  //   ADMIN DATABASE SOURCE ENTRY ARRAY
  // ==========================================
  const gameDatabase = [
    {
      id: "game-1",
      title: "Spiritual Warefare",
      tagline: "2D",
      platform: "PC ONLY",
      poster: "sw.jpg",       // Matches file exactly in your local folder layout
      downloadLink: "game_build.zip" // Point this directly to your zip file target
    }
    /* ADMIN TEMPLATE: Copy this down below to add a second game!
  
    */
  ];

  // Grid Builder Engine Routine Loop Mapping
  const gridRoot = document.getElementById('featured-grid');
  
  gameDatabase.forEach(game => {
    const card = document.createElement('div');
    card.className = 'game-card';
    card.onclick = () => launchGameWindow(game.id);
    
    card.innerHTML = `
      <div class="poster-wrapper">
        <img src="${game.poster}" alt="${game.title} Graphic Poster" onerror="this.src='platform.png'">
      </div>
    `;
    gridRoot.appendChild(card);
  });

  // Action Window Trigger Processing Engine Router
  const viewWindow = document.getElementById('expanded-view-window');
  const viewContent = document.getElementById('expanded-view-content');

  function launchGameWindow(gameId) {
    const selectedGame = gameDatabase.find(g => g.id === gameId);
    if (!selectedGame) return;

    viewContent.innerHTML = `
      <div class="expanded-poster">
        <img src="${selectedGame.poster}" alt="${selectedGame.title} Main Artwork">
      </div>
      <h2 class="game-title">${selectedGame.title}</h2>
      <p class="game-tagline">${selectedGame.tagline}</p>
      <div class="platform-badge">${selectedGame.platform}</div>
      <a href="${selectedGame.downloadLink}" download class="download-btn">DOWNLOAD GAME</a>
    `;

    viewWindow.classList.add('active');
    
    // Smooth scrolling window context transition focus target layout
    viewWindow.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function closeEngineView() {
    viewWindow.classList.remove('active');
  }
</script>

</body>
</html>
